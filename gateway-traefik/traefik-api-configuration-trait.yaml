# Traefik API Configuration Trait for OpenChoreo
#
# This trait enables Traefik API management features on HTTPRoutes:
#   - Rate Limiting: Configurable request rate limits via Traefik's RateLimit Middleware
#   - Security: API key / basic auth enforcement via Traefik's BasicAuth Middleware
#   - Request Headers: Add custom headers to upstream requests via Traefik's Headers Middleware
#
# Each feature is independently toggleable. The trait conditionally creates Traefik Middleware
# CRDs and patches the HTTPRoute with the appropriate `traefik.io/router.middlewares` annotation.
#
# The patch applies to ALL HTTPRoute resources generated by the ComponentType (i.e. one per
# external/internal endpoint), so every route for the component is covered by the same
# Middleware chain.
#
# Prerequisites:
#   - Traefik v3 installed in the data plane (see README.md)
#   - Traefik CRDs available (Middleware)
#   - ComponentType must have HTTPRoute resources for the patch to target
#   - "traefik-api-configuration" must be listed in the ComponentType's allowedTraits
#
# Usage:
#   1. Add "traefik-api-configuration" to the ComponentType's allowedTraits
#   2. Reference it in the Component's traits with desired parameters
#   3. Optionally override rate limits per environment via ReleaseBinding traitOverrides
#
# See the end of this file for a complete usage example with ComponentType, Component,
# Workload, and ReleaseBinding.

---
apiVersion: openchoreo.dev/v1alpha1
kind: Trait
metadata:
  name: traefik-api-configuration
  namespace: default
spec:
  schema:
    parameters:
      # --- Rate Limiting ---
      rateLimiting:
        $default: {}
        enabled: "boolean | default=true"
        burst: "integer | default=200"

      # --- Security (BasicAuth / API Key) ---
      # Credentials must be stored in a Kubernetes Secret (htpasswd format) BEFORE
      # enabling this feature. The Secret must have a "users" key containing one
      # "user:hash" entry per line. Create it with (see NOTES section for details):
      #   kubectl create secret generic <secret-name> \
      #     --from-literal=users="$(htpasswd -nbm myuser mypassword)" \
      #     -n <namespace>
      security:
        $default: {}
        enabled: "boolean | default=false"
        # Name of an existing Kubernetes Secret containing htpasswd-formatted users.
        # The Secret must exist in the same namespace as the component and have a
        # "users" key with one "user:hash" entry per line.
        secretName: "string | default=''"

      # --- Request/Response Header Injection ---
      # Controls Traefik's Headers Middleware to inject custom headers into
      # upstream requests and/or downstream responses.
      # Headers use "Header-Name:value" format.
      # Example requestHeaders: ["X-Gateway:Traefik", "X-Managed-By:OpenChoreo"]
      # Example responseHeaders: ["X-Powered-By:OpenChoreo"]
      addHeaders:
        $default: {}
        enabled: "boolean | default=false"
        # Headers to add to upstream requests (Traefik customRequestHeaders).
        requestHeaders: "array<string> | default=[]"
        # Headers to add to downstream responses (Traefik customResponseHeaders).
        responseHeaders: "array<string> | default=[]"

    envOverrides:
      # Platform engineers can tune rate limits per environment.
      rateLimiting:
        $default: {}
        average: "integer | default=100"

  creates:
    # --- Middleware: Rate Limiting (always created) ---
    # This Middleware is ALWAYS created regardless of rateLimiting.enabled.
    # This is required because trait patches cannot be conditional — the patches section
    # does not support includeWhen, and oc_omit() in an op:add array append produces a
    # null entry that fails HTTPRoute validation. By always creating the Middleware and
    # always adding its ExtensionRef filter, we avoid the null-in-array problem.
    #
    # When rateLimiting.enabled=true:  spec.rateLimit is set (active rate limiting).
    # When rateLimiting.enabled=false: spec.inFlightReq with amount=1000000 is set.
    #   inFlightReq is used as the no-op — it is always valid in Traefik and at 1 million
    #   concurrent requests has no real effect. spec.headers={} was rejected by Traefik
    #   ("headers configuration not valid") because an empty headers spec is not allowed.
    # oc_omit() works here because it excludes a FIELD from an object (not an array element).
    - template:
        apiVersion: traefik.io/v1alpha1
        kind: Middleware
        metadata:
          name: ${metadata.name}-${trait.instanceName}-rate-limiting
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          rateLimit: >-
            ${parameters.rateLimiting.enabled ?
              {"average": envOverrides.rateLimiting.average,
               "burst": parameters.rateLimiting.burst,
               "period": "1m"} :
              oc_omit()}
          inFlightReq: >-
            ${!parameters.rateLimiting.enabled ?
              {"amount": 1000000} :
              oc_omit()}

    # --- Middleware: Security (always created) ---
    # Same always-created pattern as rate limiting above.
    #
    # When security.enabled=true:  spec.basicAuth references the user-provided Secret
    #   (parameters.security.secretName). The Secret must be created manually before
    #   deploying — see NOTES section for kubectl instructions.
    # When security.enabled=false: spec.inFlightReq with amount=1000000 is set (no-op).
    - template:
        apiVersion: traefik.io/v1alpha1
        kind: Middleware
        metadata:
          name: ${metadata.name}-${trait.instanceName}-security
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          basicAuth: >-
            ${parameters.security.enabled ?
              {"secret": parameters.security.secretName} :
              oc_omit()}
          inFlightReq: >-
            ${!parameters.security.enabled ?
              {"amount": 1000000} :
              oc_omit()}

    # --- Middleware: Add Headers (always created) ---
    # Same always-created pattern as rate limiting above.
    #
    # When addHeaders.enabled=true:  spec.headers is set with customRequestHeaders
    #   and/or customResponseHeaders from the parameters.
    # When addHeaders.enabled=false: spec.inFlightReq with amount=1000000 is set (no-op).
    - template:
        apiVersion: traefik.io/v1alpha1
        kind: Middleware
        metadata:
          name: ${metadata.name}-${trait.instanceName}-add-headers
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          headers: >-
            ${parameters.addHeaders.enabled ?
              {"customRequestHeaders": parameters.addHeaders.requestHeaders.transformMapEntry(i, h, {h.split(":")[0]: h.split(":")[1]}),
               "customResponseHeaders": parameters.addHeaders.responseHeaders.transformMapEntry(i, h, {h.split(":")[0]: h.split(":")[1]})} :
              oc_omit()}
          inFlightReq: >-
            ${!parameters.addHeaders.enabled ?
              {"amount": 1000000} :
              oc_omit()}

  patches:
    # --- Patch HTTPRoute: Attach Rate Limiting Middleware via ExtensionRef ---
    # Always appended — the Middleware always exists (see creates above).
    # ExtensionRef is the correct mechanism for attaching Traefik Middlewares when using
    # the kubernetesgateway provider. The traefik.io/router.middlewares annotation is NOT
    # read by this provider and must not be used.
    - target:
        group: gateway.networking.k8s.io
        version: v1
        kind: HTTPRoute
      operations:
        - op: add
          path: /spec/rules/0/filters/-
          value:
            type: ExtensionRef
            extensionRef:
              group: traefik.io
              kind: Middleware
              name: ${metadata.name}-${trait.instanceName}-rate-limiting

    # --- Patch HTTPRoute: Attach Security Middleware via ExtensionRef ---
    # Always appended — the Middleware always exists (see creates above).
    - target:
        group: gateway.networking.k8s.io
        version: v1
        kind: HTTPRoute
      operations:
        - op: add
          path: /spec/rules/0/filters/-
          value:
            type: ExtensionRef
            extensionRef:
              group: traefik.io
              kind: Middleware
              name: ${metadata.name}-${trait.instanceName}-security

    # --- Patch HTTPRoute: Attach Add-Headers Middleware via ExtensionRef ---
    # Always appended — the Middleware always exists (see creates above).
    - target:
        group: gateway.networking.k8s.io
        version: v1
        kind: HTTPRoute
      operations:
        - op: add
          path: /spec/rules/0/filters/-
          value:
            type: ExtensionRef
            extensionRef:
              group: traefik.io
              kind: Middleware
              name: ${metadata.name}-${trait.instanceName}-add-headers

---
# =============================================================================
# USAGE EXAMPLE
# =============================================================================
#
# The following resources demonstrate how to use the traefik-api-configuration
# trait. The ComponentType below is the standard OpenChoreo "service" type
# (from componenttype.yaml in this module) with traefik-api-configuration added
# to allowedTraits. Apply componenttype.yaml first, then this section.

# --- ComponentType: service (with Traefik trait enabled) ---
# This is the standard OpenChoreo service ComponentType extended with
# traefik-api-configuration in allowedTraits. The ComponentType creates
# HTTPRoutes via forEach over workload.endpoints — the trait's patch section
# targets all of them by kind, applying the same Middleware chain to every route.
apiVersion: openchoreo.dev/v1alpha1
kind: ComponentType
metadata:
  name: service
  namespace: default
  annotations:
    openchoreo.dev/description: "Component type for backend services that expose HTTP endpoints"
spec:
  workloadType: deployment

  allowedWorkflows:
    - kind: Workflow
      name: google-cloud-buildpacks
    - kind: Workflow
      name: ballerina-buildpack
    - kind: Workflow
      name: docker

  allowedTraits:
    - name: api-configuration
    - name: observability-alert-rule
    - name: traefik-api-configuration  # Added for Traefik gateway module

  validations:
    - rule: "${size(workload.endpoints) > 0}"
      message: "Service components must have at least one endpoint. Use 'deployment/worker' for components without endpoints."

  schema:
    types:
      ResourceRequirements:
        requests: "ResourceQuantity | default={}"
        limits: "ResourceQuantity | default={}"
      ResourceQuantity:
        cpu: "string | default=100m"
        memory: "string | default=256Mi"

    parameters: {}

    envOverrides:
      replicas: "integer | default=1"
      resources: "ResourceRequirements | default={}"
      imagePullPolicy: "string | default=IfNotPresent"

  resources:
    - id: deployment
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${metadata.name}
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          replicas: ${envOverrides.replicas}
          selector:
            matchLabels: ${metadata.podSelectors}
          template:
            metadata:
              labels: ${metadata.podSelectors}
            spec:
              containers:
                - name: main
                  image: ${workload.container.image}
                  imagePullPolicy: ${envOverrides.imagePullPolicy}
                  command: |
                    ${has(workload.container.command) ? workload.container.command : oc_omit()}
                  args: |
                    ${has(workload.container.args) ? workload.container.args : oc_omit()}
                  resources:
                    requests:
                      cpu: ${envOverrides.resources.requests.cpu}
                      memory: ${envOverrides.resources.requests.memory}
                    limits:
                      cpu: ${envOverrides.resources.limits.cpu}
                      memory: ${envOverrides.resources.limits.memory}
                  env: ${connections.toContainerEnv()}
                  envFrom: ${configurations.toContainerEnvFrom()}
                  volumeMounts: ${configurations.toContainerVolumeMounts()}
              volumes: ${configurations.toVolumes()}

    - id: service
      includeWhen: ${size(workload.endpoints) > 0}
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${metadata.componentName}
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          type: ClusterIP
          selector: ${metadata.podSelectors}
          ports: ${workload.toServicePorts()}

    - id: httproute-external
      forEach: '${workload.endpoints.transformList(name, ep, ("external" in ep.visibility && ep.type in ["HTTP", "REST", "GraphQL", "Websocket"]) ? [name] : []).flatten()}'
      var: endpoint
      template:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: ${oc_generate_name(metadata.componentName, endpoint)}
          namespace: ${metadata.namespace}
          labels: '${oc_merge(metadata.labels, {"openchoreo.dev/endpoint-name": endpoint, "openchoreo.dev/endpoint-visibility": "external"})}'
        spec:
          parentRefs:
            - name: ${gateway.ingress.external.name}
              namespace: ${gateway.ingress.external.namespace}
          hostnames: |
            ${[gateway.ingress.external.?http, gateway.ingress.external.?https]
              .filter(g, g.hasValue()).map(g, g.value().host).distinct()
              .map(h, metadata.environmentName + "-" + metadata.componentNamespace + "." + h)}
          rules:
          - matches:
            - path:
                type: PathPrefix
                value: /${metadata.componentName}-${endpoint}
            filters:
              - type: URLRewrite
                urlRewrite:
                  path:
                    type: ReplacePrefixMatch
                    replacePrefixMatch: '${workload.endpoints[endpoint].?basePath.orValue("") != "" ? workload.endpoints[endpoint].?basePath.orValue("") : "/"}'
            backendRefs:
            - name: ${metadata.componentName}
              port: ${workload.endpoints[endpoint].port}

    - id: httproute-internal
      forEach: '${workload.endpoints.transformList(name, ep, ("internal" in ep.visibility && ep.type in ["HTTP", "REST", "GraphQL", "Websocket"]) ? [name] : []).flatten()}'
      var: endpoint
      template:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: '${oc_generate_name(metadata.componentName, endpoint, "internal")}'
          namespace: ${metadata.namespace}
          labels: '${oc_merge(metadata.labels, {"openchoreo.dev/endpoint-name": endpoint, "openchoreo.dev/endpoint-visibility": "internal"})}'
        spec:
          parentRefs:
            - name: ${gateway.ingress.internal.name}
              namespace: ${gateway.ingress.internal.namespace}
          hostnames: |
            ${[gateway.ingress.internal.?http, gateway.ingress.internal.?https]
              .filter(g, g.hasValue()).map(g, g.value().host).distinct()
              .map(h, metadata.environmentName + "-" + metadata.componentNamespace + "." + h)}
          rules:
          - matches:
            - path:
                type: PathPrefix
                value: /${metadata.componentName}-${endpoint}
            filters:
              - type: URLRewrite
                urlRewrite:
                  path:
                    type: ReplacePrefixMatch
                    replacePrefixMatch: '${workload.endpoints[endpoint].?basePath.orValue("") != "" ? workload.endpoints[endpoint].?basePath.orValue("") : "/"}'
            backendRefs:
            - name: ${metadata.componentName}
              port: ${workload.endpoints[endpoint].port}

    - id: env-config
      forEach: ${configurations.toConfigEnvsByContainer()}
      var: envConfig
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${envConfig.resourceName}
          namespace: ${metadata.namespace}
        data: |
          ${envConfig.envs.transformMapEntry(index, env, {env.name: env.value})}

    - id: file-config
      forEach: ${configurations.toConfigFileList()}
      var: config
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${config.resourceName}
          namespace: ${metadata.namespace}
        data:
          ${config.name}: |
            ${config.value}

    - id: secret-env-external
      forEach: ${configurations.toSecretEnvsByContainer()}
      var: secretEnv
      template:
        apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: ${secretEnv.resourceName}
          namespace: ${metadata.namespace}
        spec:
          refreshInterval: 15s
          secretStoreRef:
            name: ${dataplane.secretStore}
            kind: ClusterSecretStore
          target:
            name: ${secretEnv.resourceName}
            creationPolicy: Owner
          data: |
            ${secretEnv.envs.map(secret, {
              "secretKey": secret.name,
              "remoteRef": {
                "key": secret.remoteRef.key,
                "property": has(secret.remoteRef.property) ? secret.remoteRef.property : oc_omit()
              }
            })}

    - id: secret-file-external
      forEach: ${configurations.toSecretFileList()}
      var: file
      template:
        apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: ${file.resourceName}
          namespace: ${metadata.namespace}
        spec:
          refreshInterval: 15s
          secretStoreRef:
            name: ${dataplane.secretStore}
            kind: ClusterSecretStore
          target:
            name: ${file.resourceName}
            creationPolicy: Owner
          data:
            - secretKey: ${file.name}
              remoteRef:
                key: ${file.remoteRef.key}
                property: |
                  ${has(file.remoteRef.property) ? file.remoteRef.property : oc_omit()}

---
# --- Component: Using Traefik API configuration with the service ComponentType ---
# The service ComponentType has no parameters (envOverrides only), so only
# the traits block is needed for Traefik-specific configuration.
apiVersion: openchoreo.dev/v1alpha1
kind: Component
metadata:
  name: greeter-service
  namespace: default
spec:
  owner:
    projectName: default
  autoDeploy: true
  componentType:
    kind: ComponentType
    name: deployment/service

  traits:
    - name: traefik-api-configuration
      instanceName: greeter-api
      parameters:
        rateLimiting:
          enabled: true
          burst: 10
          period: "1m"
          average: 10
        security:
          enabled: true
          # Name of the Kubernetes Secret containing htpasswd users.
          # Create it before deploying — see NOTES section for instructions.
          secretName: greeter-api-basic-auth
        addHeaders:
          enabled: true
          requestHeaders:
            - "X-Gateway:Traefik"
            - "X-Managed-By:OpenChoreo"
          responseHeaders:
            - "X-Powered-By:OpenChoreo"

---
# --- Workload ---
apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: greeter-service-workload
  namespace: default
spec:
  owner:
    projectName: default
    componentName: greeter-service

  endpoints:
    http:
      type: HTTP
      port: 9090
      visibility: [external]

  container:
    image: "ghcr.io/openchoreo/samples/greeter-service:latest"
    args:
      - --port
      - "9090"

---
# --- ReleaseBinding: Development environment ---
# Uses componentTypeEnvOverrides to configure replicas and resources (per the
# service ComponentType's envOverrides schema). Overrides rate limit to 600
# req/min for development via traitOverrides.
apiVersion: openchoreo.dev/v1alpha1
kind: ReleaseBinding
metadata:
  name: greeter-service-development
  namespace: default
spec:
  owner:
    projectName: default
    componentName: greeter-service

  environment: development

  componentTypeEnvOverrides:
    replicas: 1
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"

  traitOverrides:
    greeter-api:
      rateLimiting:
        average: 10

---
# --- ReleaseBinding: Production environment ---
# Uses the default rate limit of 60 req/min (stricter).
apiVersion: openchoreo.dev/v1alpha1
kind: ReleaseBinding
metadata:
  name: greeter-service-production
  namespace: default
spec:
  owner:
    projectName: default
    componentName: greeter-service

  environment: production

  componentTypeEnvOverrides:
    replicas: 3
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "2000m"
        memory: "2Gi"

  traitOverrides:
    greeter-api:
      rateLimiting:
        average: 100  # Default limit for production

# =============================================================================
# RENDERED OUTPUT (what gets applied to the data plane)
# =============================================================================
#
# With rate limiting, security, and header injection enabled, the trait produces:
#
# 1. Middleware: rate-limiting
#    ---
#    apiVersion: traefik.io/v1alpha1
#    kind: Middleware
#    metadata:
#      name: <release-name>-greeter-api-rate-limiting
#    spec:
#      rateLimit:
#        average: 200        # From envOverrides (development)
#        burst: 200
#        period: 1s
#
# 2. Middleware: security (BasicAuth)
#    ---
#    apiVersion: traefik.io/v1alpha1
#    kind: Middleware
#    metadata:
#      name: <release-name>-greeter-api-security
#    spec:
#      basicAuth:
#        secret: greeter-api-basic-auth   # user-provided Secret (secretName parameter)
#
# 3. Middleware: add-headers (Headers)
#    ---
#    apiVersion: traefik.io/v1alpha1
#    kind: Middleware
#    metadata:
#      name: <release-name>-greeter-api-add-headers
#    spec:
#      headers:
#        customRequestHeaders:
#          X-Gateway: "Traefik"
#          X-Managed-By: "OpenChoreo"
#        customResponseHeaders:
#          X-Powered-By: "OpenChoreo"
#
# 4. Patched HTTPRoute (three ExtensionRef filters appended):
#    ---
#    apiVersion: gateway.networking.k8s.io/v1
#    kind: HTTPRoute
#    metadata:
#      name: greeter-service-http   # oc_generate_name(componentName, endpoint)
#    spec:
#      rules:
#        - filters:
#            - type: URLRewrite        # Pre-existing filter from ComponentType (preserved)
#              urlRewrite:
#                path:
#                  type: ReplacePrefixMatch
#                  replacePrefixMatch: /
#            - type: ExtensionRef     # Rate limiting — appended by trait
#              extensionRef:
#                group: traefik.io
#                kind: Middleware
#                name: <release-name>-greeter-api-rate-limiting
#            - type: ExtensionRef     # BasicAuth security — appended by trait
#              extensionRef:
#                group: traefik.io
#                kind: Middleware
#                name: <release-name>-greeter-api-security
#            - type: ExtensionRef     # Header injection — appended by trait
#              extensionRef:
#                group: traefik.io
#                kind: Middleware
#                name: <release-name>-greeter-api-add-headers
#
# =============================================================================
# NOTES
# =============================================================================
#
# 1. BasicAuth / API Key Setup (required when security.enabled is true):
#    The BasicAuth middleware enforces HTTP Basic Authentication. Callers pass
#    credentials in the Authorization header (base64-encoded "user:password").
#    Use the username as an API key identifier and the password as the API key.
#
#    Credentials are NOT stored in the Component manifest. You must create a
#    Kubernetes Secret manually before deploying the component.
#
#    Step 1 — Generate an htpasswd hash (requires apache2-utils or httpd-tools):
#      htpasswd -nbm api-user mysecretkey
#      # Output: api-user:$apr1$xxxxxxxx$xxxxxxxxxxxxxxxxxxxxxxxxx
#
#    Step 2 — Create the Kubernetes Secret:
#      # Single user:
#      kubectl create secret generic greeter-api-basic-auth \
#        --from-literal=users="$(htpasswd -nbm api-user mysecretkey)" \
#        -n <namespace>
#
#      # Multiple users (append one per line):
#      printf "user1:$(htpasswd -nbm user1 pass1 | cut -d: -f2)\nuser2:$(htpasswd -nbm user2 pass2 | cut -d: -f2)" \
#        | kubectl create secret generic greeter-api-basic-auth --from-file=users=/dev/stdin -n <namespace>
#
#    Step 3 — Reference the Secret in the Component trait parameters:
#      security:
#        enabled: true
#        secretName: greeter-api-basic-auth
#
#    Step 4 — Test with curl:
#      curl -u api-user:mysecretkey http://your-service/path
#      # or with an explicit header:
#      curl -H "Authorization: Basic $(echo -n 'api-user:mysecretkey' | base64)" http://your-service/path
#
# 2. Middleware Patch Scope:
#    The patch targets all HTTPRoute resources rendered from the ComponentType.
#    Since the service ComponentType uses forEach over workload.endpoints to
#    create one HTTPRoute per external/internal endpoint, the same Middleware
#    annotation is applied to every route. This is intentional — all routes for
#    the component share the same Middleware chain.
#
# 3. Rate Limiting Scope:
#    Traefik's rateLimit middleware is local (per-router instance), not per-client.
#    The `average` is the number of requests allowed per `period` (1s).
#    The `burst` allows short spikes above the average rate.
#    For per-source-IP rate limiting, configure sourceCriterion.ipStrategy in
#    the Middleware directly (extend the trait schema to expose this).
#
# 4. Middleware Annotation Format:
#    Traefik requires the namespace prefix in the middleware reference:
#      <namespace>-<middleware-name>@kubernetescrd
#    This is automatically computed by the trait from metadata.namespace and
#    the generated middleware name.
#
# 5. Selective Feature Use:
#    Enable only the features you need:
#
#    traits:
#      - name: traefik-api-configuration
#        instanceName: my-api
#        parameters:
#          rateLimiting:
#            enabled: true       # Only rate limiting
#          security:
#            enabled: false      # No BasicAuth
#          addHeaders:
#            enabled: false      # No header injection
#
# 6. Multiple Trait Instances:
#    You can apply different configurations to different routes by using
#    multiple instances (if the ComponentType has multiple HTTPRoutes).
#    Note: since the patch targets by kind (not by name), all instances
#    will add their annotations — Traefik merges comma-separated middleware lists.
#
#    traits:
#      - name: traefik-api-configuration
#        instanceName: public-api
#        parameters:
#          rateLimiting:
#            enabled: true
#          security:
#            enabled: true
#            secretName: public-api-basic-auth
#      - name: traefik-api-configuration
#        instanceName: internal-api
#        parameters:
#          rateLimiting:
#            enabled: false
#          security:
#            enabled: false
#          addHeaders:
