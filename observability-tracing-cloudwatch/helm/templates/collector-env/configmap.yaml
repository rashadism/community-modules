{{- include "tracing-cloudwatch.validate" . }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: tracing-cloudwatch-instance-env
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: observability-tracing-cloudwatch
data:
  INSTANCE_NAME: {{ include "tracing-cloudwatch.instanceName" . | quote }}
  AWS_REGION: {{ include "tracing-cloudwatch.region" . | quote }}
