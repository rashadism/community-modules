name: Validate PR

on:
  pull_request:
    branches: [main]
    paths:
      - "**/init/**"
      - "**/helm/**"
      - "**/module.yaml"
      - "**/*.go"
      - "**/go.mod"
      - "**/go.sum"
      - "**/Dockerfile"
      - "**/Makefile"

permissions:
  contents: read

jobs:
  check-version-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Ensure chart version is bumped for changed modules
        run: |
          # Get the list of changed files compared to the base branch
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          echo "Changed files:"
          echo "$CHANGED_FILES"
          echo ""

          FAILED=false

          for module_dir in */; do
            module="${module_dir%/}"
            chart_dir="${module}/helm"

            # Skip if this module has no helm chart
            if [ ! -f "${chart_dir}/Chart.yaml" ]; then
              continue
            fi

            # Check if any files in this module were changed
            if ! echo "$CHANGED_FILES" | grep -q "^${module}/"; then
              continue
            fi

            # Skip if only non-substantive files changed (e.g., README.md, docs)
            # Require version bump for: init/, helm/, module.yaml, .go files, go.mod/sum, Dockerfile, Makefile
            if ! echo "$CHANGED_FILES" | grep -qE "^${module}/(init/|helm/|module\.yaml$|.*\.go$|(.*/)?go\.mod$|(.*/)?go\.sum$|(.*/)?Dockerfile$|(.*/)?Makefile$)"; then
              continue
            fi

            # Check if version was bumped
            OLD_VERSION=$(git show origin/${{ github.base_ref }}:"${chart_dir}/Chart.yaml" 2>/dev/null | yq '.version' 2>/dev/null || echo "")
            NEW_VERSION=$(yq '.version' "${chart_dir}/Chart.yaml")

            if [ "$OLD_VERSION" = "$NEW_VERSION" ]; then
              echo "::error::Module '${module}' has changes but Chart.yaml version was not bumped (still ${OLD_VERSION}). Please bump the version in ${chart_dir}/Chart.yaml."
              FAILED=true
            else
              echo "✓ ${module}: version bumped ${OLD_VERSION} → ${NEW_VERSION}"
            fi
          done

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "One or more modules have changes without a version bump."
            echo "Please update the 'version' field in the relevant Chart.yaml file(s)."
            exit 1
          fi

          echo ""
          echo "All changed modules have version bumps. ✓"

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images for changed modules
        run: |
          set -euo pipefail

          # Get the list of changed files compared to the base branch
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          echo "Changed files:"
          echo "$CHANGED_FILES"
          echo ""

          BUILD_COUNT=0

          for module_dir in */; do
            module="${module_dir%/}"

            # Skip if this module has no module.yaml
            if [ ! -f "${module}/module.yaml" ]; then
              continue
            fi

            # Check if any files in this module were changed
            if ! echo "$CHANGED_FILES" | grep -q "^${module}/"; then
              continue
            fi

            image_count=$(yq '.images | length' "${module}/module.yaml")
            if [ "$image_count" = "0" ] || [ "$image_count" = "null" ]; then
              echo "Skipping ${module}: no images defined"
              continue
            fi

            for i in $(seq 0 $((image_count - 1))); do
              image_name=$(yq ".images[${i}].name" "${module}/module.yaml")
              context=$(yq ".images[${i}].context" "${module}/module.yaml")
              dockerfile=$(yq ".images[${i}].dockerfile" "${module}/module.yaml")

              echo "::group::Building ${image_name} (${module})"
              docker buildx build \
                --platform linux/amd64 \
                --load \
                -t "${image_name}:pr-validation" \
                -f "${module}/${dockerfile}" \
                "${module}/${context}"
              echo "::endgroup::"

              BUILD_COUNT=$((BUILD_COUNT + 1))
            done
          done

          echo ""
          if [ "$BUILD_COUNT" -eq 0 ]; then
            echo "No Docker images to build for changed modules."
          else
            echo "Successfully built ${BUILD_COUNT} image(s). ✓"
          fi

  unit-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install yq
        uses: mikefarah/yq@v4

      # TODO: Extend language setup for non-Go modules as they are added
      - name: Determine Go version
        id: go-version
        run: |
          # Find the highest Go version across all go.mod files
          GO_VERSION=$(find . -name 'go.mod' -exec grep '^go ' {} \; | awk '{print $2}' | sort -V | tail -1)
          echo "version=${GO_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.go-version.outputs.version }}

      - name: Run unit tests for changed modules
        run: |
          set -euo pipefail

          # Get the list of changed files compared to the base branch
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          echo "Changed files:"
          echo "$CHANGED_FILES"
          echo ""

          TEST_COUNT=0
          FAILED=false

          for module_dir in */; do
            module="${module_dir%/}"

            # Skip if this module has no module.yaml
            if [ ! -f "${module}/module.yaml" ]; then
              continue
            fi

            # Check if any files in this module were changed
            if ! echo "$CHANGED_FILES" | grep -q "^${module}/"; then
              continue
            fi

            # Skip modules without a Makefile
            if [ ! -f "${module}/Makefile" ]; then
              echo "Skipping ${module}: no Makefile"
              continue
            fi

            # Fail if Makefile exists but has no unit-test target
            if ! grep -q '^unit-test:' "${module}/Makefile"; then
              echo "::error::Module '${module}' has a Makefile but no 'unit-test' target. Please add a 'unit-test' target to ${module}/Makefile."
              FAILED=true
              continue
            fi

            echo "::group::Testing ${module}"
            make -C "${module}" unit-test
            echo "::endgroup::"

            TEST_COUNT=$((TEST_COUNT + 1))
          done

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "One or more modules have a Makefile without a 'unit-test' target."
            exit 1
          fi

          echo ""
          if [ "$TEST_COUNT" -eq 0 ]; then
            echo "No modules with unit tests found for changed files."
          else
            echo "Successfully tested ${TEST_COUNT} module(s). ✓"
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          files: ./*-coverage.out
          fail_ci_if_error: false
          use_oidc: ${{ !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) }}
