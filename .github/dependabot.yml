version: 2
updates:
  # Go modules
  - package-ecosystem: "gomod"
    directories:
      - "/*"
      - "/observability-events-otel-collector/k8seventenrichprocessor"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      k8s.io:
        patterns:
          - "k8s.io/*"
          - "sigs.k8s.io/*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Dockerfiles
  - package-ecosystem: "docker"
    directories:
      - "/*"
      - "/*/init"
    schedule:
      interval: "monthly"

  # Helm charts
  - package-ecosystem: "helm"
    directories:
      - "/*/helm"
    schedule:
      interval: "monthly"
