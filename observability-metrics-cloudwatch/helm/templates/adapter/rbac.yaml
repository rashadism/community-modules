{{- if .Values.adapter.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: metrics-adapter-cloudwatch
  labels:
    app: metrics-adapter-cloudwatch
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: metrics-adapter-cloudwatch
  labels:
    app: metrics-adapter-cloudwatch
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: metrics-adapter-cloudwatch
subjects:
  - kind: ServiceAccount
    name: metrics-adapter-cloudwatch
    namespace: {{ .Release.Namespace }}
{{- end }}
