{{- if .Values.adapter.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: metrics-adapter-cloudwatch
  namespace: {{ .Release.Namespace }}
  labels:
    app: metrics-adapter-cloudwatch
  {{- with .Values.adapter.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- /*
Required IAM permissions for the adapter:
  cloudwatch:GetMetricData, cloudwatch:ListMetrics, cloudwatch:PutMetricAlarm,
  cloudwatch:DescribeAlarms, cloudwatch:DeleteAlarms, cloudwatch:TagResource,
  cloudwatch:UntagResource, cloudwatch:ListTagsForResource,
  sts:GetCallerIdentity.
*/ -}}
{{- end }}
