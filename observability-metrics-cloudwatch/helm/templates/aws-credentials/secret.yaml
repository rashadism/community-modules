{{- /*
Static AWS credentials Secret for the k3d / kind path. On EC2 / EKS with an
instance-profile, IRSA, or Pod Identity, leave `awsCredentials.create=false`.
*/ -}}
{{- include "metrics-cloudwatch.validate" . -}}
{{- if .Values.awsCredentials.create }}
{{- if not .Values.awsCredentials.name }}
{{- fail "awsCredentials.name is required when awsCredentials.create=true" }}
{{- end }}
{{- if not .Values.awsCredentials.accessKeyId }}
{{- fail "awsCredentials.accessKeyId is required when awsCredentials.create=true" }}
{{- end }}
{{- if not .Values.awsCredentials.secretAccessKey }}
{{- fail "awsCredentials.secretAccessKey is required when awsCredentials.create=true" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.awsCredentials.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: observability-metrics-cloudwatch
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: {{ .Values.awsCredentials.accessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.awsCredentials.secretAccessKey | quote }}
  AWS_REGION: {{ include "metrics-cloudwatch.region" . | quote }}
{{- end }}
