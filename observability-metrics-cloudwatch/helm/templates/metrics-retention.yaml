{{- $metrics := .Values.metrics | default dict -}}
{{- $retention := (get $metrics "retention") | default dict -}}
{{- $image := (get $retention "image") | default dict -}}
{{- $serviceAccount := (get $retention "serviceAccount") | default dict -}}
{{- $enabled := true -}}
{{- if hasKey $retention "enabled" -}}{{- $enabled = get $retention "enabled" -}}{{- end -}}
{{- $serviceAccountCreate := true -}}
{{- if hasKey $serviceAccount "create" -}}{{- $serviceAccountCreate = get $serviceAccount "create" -}}{{- end -}}
{{- if $enabled }}
{{- include "metrics-cloudwatch.validate" . -}}
{{- if $serviceAccountCreate }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "metrics-cloudwatch.retentionServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: metrics-cloudwatch-retention
  {{- with (get $serviceAccount "annotations") }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: metrics-cloudwatch-retention
  namespace: {{ .Release.Namespace }}
  labels:
    app: metrics-cloudwatch-retention
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ get $retention "backoffLimit" | default 3 }}
  ttlSecondsAfterFinished: {{ get $retention "ttlSecondsAfterFinished" | default 300 }}
  template:
    metadata:
      labels:
        app: metrics-cloudwatch-retention
    spec:
      serviceAccountName: {{ include "metrics-cloudwatch.retentionServiceAccountName" . }}
      restartPolicy: OnFailure
      containers:
        - name: aws-cli
          image: "{{ get $image "repository" | default "public.ecr.aws/aws-cli/aws-cli" }}:{{ get $image "tag" | default "2.15.57" }}"
          imagePullPolicy: {{ get $image "pullPolicy" | default "IfNotPresent" }}
          env:
            - name: AWS_REGION
              value: {{ include "metrics-cloudwatch.region" . | quote }}
            - name: LOG_GROUP_NAME
              value: {{ include "metrics-cloudwatch.logGroup" . | quote }}
            - name: RETENTION_DAYS
              value: {{ .Values.metrics.retentionDays | quote }}
          {{- if .Values.awsCredentials.name }}
          envFrom:
            - secretRef:
                name: {{ .Values.awsCredentials.name }}
          {{- end }}
          command:
            - /bin/sh
            - -ec
          args:
            - |
              aws logs create-log-group --log-group-name "${LOG_GROUP_NAME}" 2>/dev/null || true
              aws logs put-retention-policy \
                --log-group-name "${LOG_GROUP_NAME}" \
                --retention-in-days "${RETENTION_DAYS}"
{{- end }}
