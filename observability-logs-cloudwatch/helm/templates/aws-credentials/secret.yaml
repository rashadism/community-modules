{{- /*
Static AWS credentials Secret for the v1 k3d/kind path. On EC2/EKS with an
instance-profile, IRSA or Pod Identity, set `awsCredentials.create=false` and
leave `awsCredentials.name` empty — the adapter and the CloudWatch Agent will
fall through to the AWS SDK default credentials chain.
*/ -}}
{{- include "logs-cloudwatch.validate" . -}}
{{- if .Values.awsCredentials.create }}
{{- if not .Values.awsCredentials.name }}
{{- fail "awsCredentials.name is required when awsCredentials.create=true (e.g. --set awsCredentials.name=cloudwatch-aws-credentials)" }}
{{- end }}
{{- if not .Values.awsCredentials.accessKeyId }}
{{- fail "awsCredentials.accessKeyId is required when awsCredentials.create=true" }}
{{- end }}
{{- if not .Values.awsCredentials.secretAccessKey }}
{{- fail "awsCredentials.secretAccessKey is required when awsCredentials.create=true" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.awsCredentials.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: observability-logs-cloudwatch
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: {{ .Values.awsCredentials.accessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.awsCredentials.secretAccessKey | quote }}
  AWS_REGION: {{ include "logs-cloudwatch.region" . | quote }}
{{- end }}
