{{- if .Values.adapter.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: logs-adapter-cloudwatch
  namespace: {{ .Release.Namespace }}
  labels:
    app: logs-adapter-cloudwatch
  {{- with .Values.adapter.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- /*
Required IAM permissions when the adapter is installed as-is (Logs Insights query path):
  logs:StartQuery, logs:StopQuery, logs:GetQueryResults, logs:DescribeLogGroups,
  sts:GetCallerIdentity.

When adapter.alerting.enabled=true, additionally grant:
  logs:PutMetricFilter, logs:DescribeMetricFilters, logs:DeleteMetricFilter,
  cloudwatch:PutMetricAlarm, cloudwatch:DescribeAlarms, cloudwatch:DeleteAlarms,
  cloudwatch:TagResource, cloudwatch:UntagResource, cloudwatch:ListTagsForResource.

SNS/Lambda/EventBridge target permissions are owned by those resources, not by
this adapter.
*/ -}}
{{- end }}
