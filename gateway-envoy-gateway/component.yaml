# =============================================================================
# NOTES
# =============================================================================
#
# 1. JWT Identity Provider Configuration:
#    The JWT provider details (issuer, JWKS URL, host, port) are configured in the
#    ClusterTrait template, not as component parameters. Update the Backend and
#    SecurityPolicy templates in envoy-gateway-api-configuration-trait.yaml with
#    your identity provider's details before applying the trait.
#
# 2. Key Difference from Kong:
#    Envoy Gateway uses BackendTrafficPolicy and SecurityPolicy CRDs that
#    attach to HTTPRoutes via targetRefs. No annotations on the HTTPRoute are
#    needed for rate limiting or security. This makes policy attachment more
#    explicit and easier to audit.
#
# 3. Selective Feature Use:
#    Enable only the features you need:
#
#    traits:
#      - name: envoy-gateway-api-configuration
#        instanceName: my-api
#        parameters:
#          jwt:
#            enabled: false     # No auth
#          rateLimiting:
#            enabled: true      # Only rate limiting
#          addResponseHeaders:
#            enabled: false     # No header injection
#
# 4. Multiple Trait Instances:
#    You can apply different configurations to different routes by using
#    multiple instances (if the ComponentType has multiple HTTPRoutes):
#
#    traits:
#      - name: envoy-gateway-api-configuration
#        instanceName: public-api
#        parameters:
#          jwt:
#            enabled: true
#          rateLimiting:
#            enabled: true
#            requestsPerUnit: 100
#      - name: envoy-gateway-api-configuration
#        instanceName: internal-api
#        parameters:
#          jwt:
#            enabled: false
#          rateLimiting:
#            enabled: false
#          addResponseHeaders:
#            enabled: true
#            headers:
#              - name: X-Internal
#                value: "true"
#
# 5. Per-Environment Rate Limit Overrides:
#    Override rate limits per environment via ReleaseBinding traitOverrides:
#
#    traitOverrides:
#      greeter-api:
#        rateLimiting:
#          requestsPerUnit: 600  # Higher limit for production
