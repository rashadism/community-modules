# =============================================================================
# USAGE EXAMPLE
# =============================================================================
#
# The following resources demonstrate how to use the envoy-gateway-api-configuration
# trait with the standard OpenChoreo service ComponentType. The ComponentType at
# samples/getting-started/component-types/service.yaml must include
# "envoy-gateway-api-configuration" in its allowedTraits.

# --- Component: Using all three Envoy Gateway API management features ---
---
apiVersion: openchoreo.dev/v1alpha1
kind: Component
metadata:
  name: greeter-service
  namespace: default
spec:
  owner:
    projectName: default
  autoDeploy: true
  componentType:
    kind: ClusterComponentType
    name: deployment/service

  traits:
    - name: envoy-gateway-api-configuration
      instanceName: greeter-api
      kind: ClusterTrait
      parameters:
        endpointName: http
        jwt:
          enabled: true
        rateLimiting:
          enabled: true
          unit: Minute
          requestsPerUnit: 100
        addResponseHeaders:
          enabled: true
          headers:
            - name: X-Gateway
              value: Envoy
            - name: X-Managed-By
              value: OpenChoreo

---
# --- Workload ---
apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: greeter-service-workload
  namespace: default
spec:
  owner:
    projectName: default
    componentName: greeter-service

  endpoints:
    http:
      type: HTTP
      port: 9090
      visibility: [external]

  container:
    image: "ghcr.io/openchoreo/samples/greeter-service:latest"
    args:
      - --port
      - "9090"

---
# =============================================================================
# RENDERED OUTPUT (what gets applied to the data plane)
# =============================================================================
#
