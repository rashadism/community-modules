# Envoy Gateway API Configuration Trait for OpenChoreo
#
# This trait enables Envoy Gateway API management features on HTTPRoutes:
#   - JWT Authentication: JWT validation via SecurityPolicy + Backend
#   - Rate Limiting: Configurable request rate limits via BackendTrafficPolicy
#   - Response Headers: Add custom headers to responses via HTTPRoute ResponseHeaderModifier
#
# Each feature is independently toggleable. The trait conditionally creates
# BackendTrafficPolicy and SecurityPolicy CRDs targeting the component's HTTPRoute,
# and patches the HTTPRoute with response header modification filters.
#
# JWT Identity Provider Configuration:
#   The JWT provider details (issuer, JWKS URL) are configured once in this trait
#   file before applying it to the cluster. When any component enables JWT, the
#   trait creates a Backend ("jwt-idp-jwks") and SecurityPolicy in the component's
#   data plane namespace. All JWT-enabled components in the same namespace share
#   the Backend resource.
#
#   Update the Backend and SecurityPolicy templates below with your identity provider
#   details before applying this trait. See README.md for configuration guidance.
#
# Prerequisites:
#   - Envoy Gateway installed in the data plane (see README.md)
#   - Envoy Gateway CRDs available (BackendTrafficPolicy, SecurityPolicy, Backend)
#   - ComponentType must have an HTTPRoute resource for the patch and targetRef to work
#
# Usage:
#   1. Update the JWT provider configuration in this file (issuer, JWKS URL, host, port)
#   2. Apply this trait to the control plane
#   3. Add "envoy-gateway-api-configuration" to the ComponentType's allowedTraits
#   4. Reference it in the Component's traits with desired parameters
#   5. Optionally override rate limits per environment via ReleaseBinding traitOverrides

---
apiVersion: openchoreo.dev/v1alpha1
kind: ClusterTrait
metadata:
  name: envoy-gateway-api-configuration
spec:
  parameters:
    openAPIV3Schema:
      type: object
      $defs:
        # --- JWT authentication configuration ---
        # Controls JWT validation via Envoy Gateway's SecurityPolicy and Backend.
        # When enabled, creates a Backend for the JWKS endpoint and a SecurityPolicy
        # for JWT enforcement on the component's HTTPRoute.
        # The identity provider details (issuer, JWKS URL) are configured in the
        # trait template below — not as component parameters.
        JwtConfig:
          type: object
          properties:
            enabled:
              type: boolean
              default: false

        # --- rate-limiting configuration ---
        # Controls Envoy Gateway's rate limiting via BackendTrafficPolicy.
        # When enabled, creates a BackendTrafficPolicy that limits requests per unit of time.
        RateLimitingConfig:
          type: object
          properties:
            enabled:
              type: boolean
              default: true
            # Rate limiting time unit: Second, Minute, or Hour
            unit:
              type: string
              default: Minute
            requestsPerUnit:
              type: integer
              default: 60

        # --- response header modification configuration ---
        # Controls adding custom headers to responses via HTTPRoute ResponseHeaderModifier.
        # When enabled, patches the HTTPRoute with a ResponseHeaderModifier filter.
        # Each header entry has "name" and "value" fields.
        AddResponseHeadersConfig:
          type: object
          properties:
            enabled:
              type: boolean
              default: false
            headers:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  value:
                    type: string
              default: []

      properties:
        # Name of the workload endpoint this trait targets.
        # Must match an endpoint key defined in the Workload spec.
        # Used to resolve the HTTPRoute name via oc_generate_name.
        endpointName:
          type: string
        jwt:
          $ref: "#/$defs/JwtConfig"
          default: {}
        rateLimiting:
          $ref: "#/$defs/RateLimitingConfig"
          default: {}
        addResponseHeaders:
          $ref: "#/$defs/AddResponseHeadersConfig"
          default: {}
      required:
        - endpointName

  creates:
    # --- Backend: JWKS endpoint for JWT validation ---
    # Created when jwt.enabled is true.
    # Points to the external JWKS host so Envoy Gateway can fetch signing keys.
    # Envoy Gateway's remoteJWKS.uri only supports HTTPS; using backendRefs
    # with a Backend resource allows routing to any endpoint (HTTP or HTTPS).
    #
    # >>> UPDATE: Replace hostname and port with your identity provider's JWKS endpoint.
    - includeWhen: ${parameters.jwt.enabled}
      template:
        apiVersion: gateway.envoyproxy.io/v1alpha1
        kind: Backend
        metadata:
          name: ${metadata.name}-${trait.instanceName}-jwks
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          endpoints:
            - fqdn:
                hostname: api.asgardeo.io    # Replace with your IdP's JWKS host
                port: 443                     # Replace with the JWKS endpoint port

    # --- BackendTLSPolicy: TLS configuration for the JWKS Backend ---
    # Created when jwt.enabled is true.
    # Sets the SNI hostname for the TLS connection to the JWKS endpoint.
    # Without this, Envoy connects to the static IP without SNI, causing
    # CDN/WAF fronting the IdP to reject the request.
    #
    # >>> UPDATE: Replace hostname with your identity provider's JWKS host.
    - includeWhen: ${parameters.jwt.enabled}
      template:
        apiVersion: gateway.networking.k8s.io/v1alpha3
        kind: BackendTLSPolicy
        metadata:
          name: ${metadata.name}-${trait.instanceName}-jwks-tls
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          targetRefs:
            - group: gateway.envoyproxy.io
              kind: Backend
              name: ${metadata.name}-${trait.instanceName}-jwks
          validation:
            hostname: api.asgardeo.io    # Replace with your IdP's JWKS host (must match Backend host)
            wellKnownCACertificates: System

    # --- SecurityPolicy: JWT Authentication ---
    # Created when jwt.enabled is true.
    # Targets the component's HTTPRoute and validates JWT tokens against the
    # configured JWKS endpoint via the Backend resource.
    # The token must be passed in the Authorization header: "Bearer <token>"
    #
    # >>> UPDATE: Replace issuer with your identity provider's issuer URL.
    - includeWhen: ${parameters.jwt.enabled}
      template:
        apiVersion: gateway.envoyproxy.io/v1alpha1
        kind: SecurityPolicy
        metadata:
          name: ${metadata.name}-${trait.instanceName}-security
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          targetRefs:
            - group: gateway.networking.k8s.io
              kind: HTTPRoute
              name: ${oc_generate_name(metadata.componentName, parameters.endpointName)}
          jwt:
            providers:
              - name: ${metadata.name}-${trait.instanceName}-jwt-provider
                issuer: "https://api.asgardeo.io/t/lahirude/oauth2/token"    # Replace with your IdP issuer URL
                remoteJWKS:
                  uri: "https://api.asgardeo.io/t/lahirude/oauth2/jwks"      # Replace with your JWKS URL (required by CRD validation)
                  backendRefs:
                    - group: gateway.envoyproxy.io
                      kind: Backend
                      name: ${metadata.name}-${trait.instanceName}-jwks
                      port: 443                                               # Must match Backend port

    # --- BackendTrafficPolicy: Rate Limiting ---
    # Created when rateLimiting.enabled is true.
    # Targets the component's HTTPRoute by name and applies a local rate limit.
    # Uses parameters.rateLimiting.requestsPerUnit so platform engineers
    # can set different limits per environment via ReleaseBinding traitOverrides.
    - includeWhen: ${parameters.rateLimiting.enabled}
      template:
        apiVersion: gateway.envoyproxy.io/v1alpha1
        kind: BackendTrafficPolicy
        metadata:
          name: ${metadata.name}-${trait.instanceName}-rate-limit
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          targetRefs:
            - group: gateway.networking.k8s.io
              kind: HTTPRoute
              name: ${oc_generate_name(metadata.componentName, parameters.endpointName)}
          rateLimit:
            type: Local
            local:
              rules:
                - limit:
                    requests: ${parameters.rateLimiting.requestsPerUnit}
                    unit: ${parameters.rateLimiting.unit}

  patches:
    # --- Patch HTTPRoute: Add Response Headers ---
    # Adds a ResponseHeaderModifier filter to the HTTPRoute's first rule.
    # Headers are specified as structured {name, value} objects matching
    # the Gateway API ResponseHeaderModifier spec.
    # The patch is skipped via omit() when addResponseHeaders.enabled is false.
    - target:
        group: gateway.networking.k8s.io
        version: v1
        kind: HTTPRoute
      operations:
        - op: add
          path: /spec/rules/0/filters/-
          value: >-
            ${parameters.addResponseHeaders.enabled ?
              {"type": "ResponseHeaderModifier", "responseHeaderModifier":
                {"add": parameters.addResponseHeaders.headers}} :
              oc_omit()}

---
