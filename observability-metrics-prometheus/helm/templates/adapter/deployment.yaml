{{- if ne .Values.global.installationMode "multiClusterExporter" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-adapter-prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    app: metrics-adapter-prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics-adapter-prometheus
  template:
    metadata:
      labels:
        app: metrics-adapter-prometheus
    spec:
      securityContext:
        runAsUser: 10500
        runAsGroup: 10500
        runAsNonRoot: true
      containers:
      - name: metrics-adapter-prometheus
        image: "{{ .Values.adapter.image.repository }}:{{ .Values.adapter.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.adapter.image.pullPolicy | default "IfNotPresent" }}
        ports:
        - containerPort: 9099
        readinessProbe:
          httpGet:
            path: /health
            port: 9099
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 9099
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 2
          failureThreshold: 3
        env:
        - name: SERVER_PORT
          value: "9099"
        - name: OBSERVER_API_INTERNAL_URL
          value: "http://observer-internal.{{ .Release.Namespace }}:8081"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          limits:
            cpu: {{ .Values.adapter.resources.limits.cpu }}
            memory: {{ .Values.adapter.resources.limits.memory }}
          requests:
            cpu: {{ .Values.adapter.resources.requests.cpu }}
            memory: {{ .Values.adapter.resources.requests.memory }}
{{- end }}
