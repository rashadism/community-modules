<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="controlPlane" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8eaf6"/>
      <stop offset="100%" stop-color="#c5cae9"/>
    </linearGradient>
    <linearGradient id="dataPlane" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="kongGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00897b"/>
      <stop offset="100%" stop-color="#00695c"/>
    </linearGradient>
    <linearGradient id="kicGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00796b"/>
      <stop offset="100%" stop-color="#00695c"/>
    </linearGradient>
    <linearGradient id="componentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42a5f5"/>
      <stop offset="100%" stop-color="#1e88e5"/>
    </linearGradient>
    <linearGradient id="controllerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5c6bc0"/>
      <stop offset="100%" stop-color="#3949ab"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowSm" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowHead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#546e7a"/>
    </marker>
    <marker id="arrowHeadGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2e7d32"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="580" rx="12" fill="#fafafa"/>

  <!-- Title -->
  <text x="390" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#263238">Kong Gateway Module &#x2014; Architecture</text>
  <text x="390" y="56" text-anchor="middle" font-size="11" fill="#78909c">Rate Limiting &#x00B7; Key Authentication &#x00B7; Response Transformation via Kong Plugins</text>

  <!-- ==================== CONTROL PLANE ==================== -->
  <rect x="40" y="76" width="700" height="74" rx="8" fill="url(#controlPlane)" filter="url(#shadow)" stroke="#9fa8da" stroke-width="1"/>
  <text x="52" y="94" font-size="9" font-weight="600" fill="#3949ab" letter-spacing="1">CONTROL PLANE</text>

  <!-- OpenChoreo Controllers -->
  <rect x="52" y="102" width="290" height="36" rx="5" fill="url(#controllerGrad)" filter="url(#shadowSm)"/>
  <text x="197" y="122" text-anchor="middle" font-size="11" font-weight="500" fill="#fff">OpenChoreo Controllers</text>
  <text x="197" y="134" text-anchor="middle" font-size="8" fill="#c5cae9">Renders Trait templates into Kong CRDs</text>

  <!-- ClusterTrait badge -->
  <rect x="370" y="102" width="356" height="36" rx="5" fill="#fff" filter="url(#shadowSm)" stroke="#9fa8da" stroke-width="1"/>
  <text x="382" y="118" font-size="9" font-weight="600" fill="#3949ab">Trait</text>
  <text x="415" y="118" font-size="9" fill="#546e7a">kong-api-management</text>
  <text x="382" y="132" font-size="8" fill="#78909c">Defines RateLimit, KeyAuth, ResponseTransformer templates</text>

  <!-- Arrow: Control Plane → Data Plane -->
  <line x1="197" y1="150" x2="197" y2="182" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <text x="210" y="170" font-size="8" fill="#78909c">applies</text>

  <!-- ==================== DATA PLANE ==================== -->
  <rect x="40" y="186" width="700" height="360" rx="8" fill="url(#dataPlane)" filter="url(#shadow)" stroke="#a5d6a7" stroke-width="1"/>
  <text x="52" y="204" font-size="9" font-weight="600" fill="#2e7d32" letter-spacing="1">DATA PLANE</text>

  <!-- Gateway CR -->
  <rect x="60" y="216" width="180" height="52" rx="6" fill="#fff" filter="url(#shadowSm)" stroke="#a5d6a7" stroke-width="1"/>
  <text x="72" y="234" font-size="9" font-weight="600" fill="#2e7d32">Gateway CR</text>
  <text x="72" y="248" font-size="9" fill="#546e7a">name: gateway-default</text>
  <text x="72" y="260" font-size="9" fill="#00695c" font-weight="500">class: kong</text>

  <!-- HTTPRoute -->
  <rect x="270" y="216" width="180" height="52" rx="6" fill="#fff" filter="url(#shadowSm)" stroke="#a5d6a7" stroke-width="1"/>
  <text x="282" y="234" font-size="9" font-weight="600" fill="#2e7d32">HTTPRoute</text>
  <text x="282" y="248" font-size="9" fill="#546e7a">parentRef: gateway-default</text>
  <text x="282" y="260" font-size="9" fill="#546e7a">+ konghq.com/plugins &#x2726;</text>

  <!-- Arrow: HTTPRoute → Gateway CR -->
  <line x1="270" y1="242" x2="243" y2="242" stroke="#546e7a" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowHead)"/>

  <!-- KIC Controller -->
  <rect x="270" y="290" width="180" height="50" rx="8" fill="url(#kicGrad)" filter="url(#shadow)"/>
  <text x="360" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Kong Ingress</text>
  <text x="360" y="326" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Controller (KIC)</text>

  <!-- Kong Gateway Proxy -->
  <rect x="60" y="290" width="180" height="50" rx="8" fill="url(#kongGrad)" filter="url(#shadow)"/>
  <text x="150" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Kong Gateway</text>
  <text x="150" y="324" text-anchor="middle" font-size="9" fill="#c8e6c9">Proxy &#x00B7; TLS &#x00B7; Plugins</text>

  <!-- Arrow: KIC → Kong Gateway -->
  <line x1="270" y1="315" x2="243" y2="315" stroke="#b2dfdb" stroke-width="1.5" marker-end="url(#arrowHead)"/>

  <!-- Arrow: Gateway CR → Kong Gateway -->
  <line x1="150" y1="268" x2="150" y2="287" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arrowHead)"/>

  <!-- Component Pod -->
  <rect x="80" y="380" width="160" height="42" rx="6" fill="url(#componentGrad)" filter="url(#shadowSm)"/>
  <text x="160" y="400" text-anchor="middle" font-size="10" font-weight="500" fill="#fff">Component Pod</text>
  <text x="160" y="414" text-anchor="middle" font-size="9" fill="#e3f2fd">:9090</text>

  <!-- Arrow: Kong Gateway → Pod -->
  <line x1="150" y1="340" x2="150" y2="377" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arrowHead)"/>

  <!-- ==================== TRAIT RESOURCES (right side) ==================== -->
  <text x="510" y="210" font-size="9" font-weight="600" fill="#2e7d32" letter-spacing="0.5">TRAIT-GENERATED RESOURCES</text>

  <!-- KongPlugin: rate-limiting -->
  <rect x="500" y="220" width="220" height="42" rx="5" fill="#fff" filter="url(#shadowSm)" stroke="#2e7d32" stroke-width="1"/>
  <text x="514" y="237" font-size="9" font-weight="600" fill="#2e7d32">KongPlugin</text>
  <text x="514" y="252" font-size="8" fill="#546e7a">plugin: rate-limiting</text>
  <!-- includeWhen badge -->
  <rect x="632" y="222" width="84" height="14" rx="3" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="0.5"/>
  <text x="674" y="232" text-anchor="middle" font-size="7" fill="#2e7d32">rateLimiting.enabled</text>

  <!-- KongPlugin: key-auth -->
  <rect x="500" y="272" width="220" height="42" rx="5" fill="#fff" filter="url(#shadowSm)" stroke="#2e7d32" stroke-width="1"/>
  <text x="514" y="289" font-size="9" font-weight="600" fill="#2e7d32">KongPlugin</text>
  <text x="514" y="304" font-size="8" fill="#546e7a">plugin: key-auth</text>
  <!-- includeWhen badge -->
  <rect x="632" y="274" width="84" height="14" rx="3" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="0.5"/>
  <text x="674" y="284" text-anchor="middle" font-size="7" fill="#2e7d32">security.enabled</text>

  <!-- KongPlugin: response-transformer -->
  <rect x="500" y="324" width="220" height="42" rx="5" fill="#fff" filter="url(#shadowSm)" stroke="#2e7d32" stroke-width="1"/>
  <text x="514" y="341" font-size="9" font-weight="600" fill="#2e7d32">KongPlugin</text>
  <text x="514" y="356" font-size="8" fill="#546e7a">plugin: response-transformer</text>
  <!-- includeWhen badge -->
  <rect x="620" y="326" width="96" height="14" rx="3" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="0.5"/>
  <text x="668" y="336" text-anchor="middle" font-size="7" fill="#2e7d32">addResponseHeaders.enabled</text>

  <!-- Combined arrow: KongPlugins → HTTPRoute (annotation binding) -->
  <path d="M500,241 L472,241 L472,250 L453,250" stroke="#2e7d32" stroke-width="1.2" fill="none" stroke-dasharray="4,3" marker-end="url(#arrowHeadGreen)"/>
  <line x1="500" y1="293" x2="472" y2="293" stroke="#2e7d32" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="500" y1="345" x2="472" y2="345" stroke="#2e7d32" stroke-width="1.2" stroke-dasharray="4,3"/>
  <!-- Vertical connector joining all three to single line -->
  <line x1="472" y1="241" x2="472" y2="345" stroke="#2e7d32" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="458" y="310" font-size="7" fill="#2e7d32" transform="rotate(-90,458,310)">annotation &#x2726;</text>

  <!-- LoadBalancer label -->
  <rect x="80" y="440" width="160" height="28" rx="5" fill="#fff" filter="url(#shadowSm)" stroke="#a5d6a7" stroke-width="1"/>
  <text x="160" y="459" text-anchor="middle" font-size="9" fill="#546e7a">LoadBalancer :19080 &#x00B7; :19443</text>

  <!-- Arrow: Pod → LoadBalancer -->
  <line x1="160" y1="422" x2="160" y2="437" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arrowHead)"/>

  <!-- Client Traffic label -->
  <text x="160" y="486" text-anchor="middle" font-size="9" fill="#78909c">&#x2191; Client Traffic</text>

  <!-- Footer -->
  <text x="390" y="564" text-anchor="middle" font-size="10" fill="#90a4ae">Each plugin is independently toggleable. KongPlugins are bound to HTTPRoutes via the konghq.com/plugins annotation.</text>
</svg>
